name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Package .app bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_DIR="VirtuMic.app/Contents/MacOS"
          mkdir -p "$APP_DIR"
          cp .build/release/VirtuMic "$APP_DIR/"

          cat > VirtuMic.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>VirtuMic</string>
            <key>CFBundleIdentifier</key>
            <string>com.shotgunzz.virtumic</string>
            <key>CFBundleName</key>
            <string>VirtuMic</string>
            <key>CFBundleDisplayName</key>
            <string>VirtuMic</string>
            <key>CFBundleVersion</key>
            <string>VERSION_PLACEHOLDER</string>
            <key>CFBundleShortVersionString</key>
            <string>VERSION_PLACEHOLDER</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>NSMicrophoneUsageDescription</key>
            <string>VirtuMic needs microphone access to process your audio input.</string>
          </dict>
          </plist>
          PLIST

          sed -i '' "s/VERSION_PLACEHOLDER/$VERSION/g" VirtuMic.app/Contents/Info.plist

          cp scripts/setup.sh VirtuMic.app/Contents/MacOS/setup.sh
          chmod +x VirtuMic.app/Contents/MacOS/setup.sh

          mkdir -p VirtuMic.app/Contents/Resources
          cp Resources/AppIcon.icns VirtuMic.app/Contents/Resources/AppIcon.icns

      - name: Create zip
        run: |
          zip -r VirtuMic.zip VirtuMic.app
          shasum -a 256 VirtuMic.zip | tee sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            VirtuMic.zip
            sha256.txt
          generate_release_notes: true
